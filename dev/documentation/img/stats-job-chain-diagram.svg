<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="440" height="802" viewBox="0 0 440 802">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <rect width="440" height="802" fill="white"/>

  <!-- Section label: per log file -->
  <text x="220" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666" font-style="italic">per log file</text>

  <!-- Box 1: ProcessUsageStatsLogFile -->
  <rect x="30" y="34" width="380" height="40" rx="4" fill="#f5de80" stroke="#c0a840" stroke-width="2"/>
  <text x="220" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="500">ProcessUsageStatsLogFile</text>

  <line x1="220" y1="74" x2="220" y2="88" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 2: RemoveDoubleClicks -->
  <rect x="30" y="88" width="380" height="40" rx="4" fill="#f5de80" stroke="#c0a840" stroke-width="2"/>
  <text x="220" y="114" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="500">RemoveDoubleClicks</text>

  <line x1="220" y1="128" x2="220" y2="142" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>


  <line x1="220" y1="668" x2="220" y2="690" stroke="#888" stroke-width="1.5"/>
  <line x1="30" y1="708" x2="410" y2="708" stroke="#bbb" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="220" y="703" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666" font-style="italic">per month</text>
  <line x1="220" y1="716" x2="220" y2="736" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 13: CompileMonthlyMetrics -->
  <rect x="30" y="736" width="380" height="40" rx="4" fill="#f5de80" stroke="#c0a840" stroke-width="2"/>
  <text x="220" y="762" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="500">CompileMonthlyMetrics</text>


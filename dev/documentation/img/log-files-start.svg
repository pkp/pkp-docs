<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="750" height="116" viewBox="0 0 750 116">
  <rect width="750" height="116" fill="white"/>

  <!-- usageEventLogs -->
  <text x="65" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#555">usageEventLogs</text>
  <rect x="7" y="16" width="115" height="95" rx="2" fill="#f9f9f9" stroke="#ddd" stroke-width="1"/>
  <rect x="17" y="21" width="95" height="16" rx="2" fill="#c8dce8" stroke="#7aa8c0"/>
  <text x="65" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">20260501.log</text>
  <rect x="17" y="39" width="95" height="16" rx="2" fill="#c8dce8" stroke="#7aa8c0"/>
  <text x="65" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">20260502.log</text>
  <rect x="17" y="57" width="95" height="16" rx="2" fill="#c8e8b8" stroke="#78b068"/>
  <text x="65" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">20260507.log *</text>

  <!-- stage -->
  <text x="188" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#555">stage</text>
  <rect x="130" y="16" width="115" height="95" rx="2" fill="#f9f9f9" stroke="#ddd" stroke-width="1"/>

  <!-- processing -->
  <text x="311" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#555">processing</text>
  <rect x="253" y="16" width="115" height="95" rx="2" fill="#f9f9f9" stroke="#ddd" stroke-width="1"/>

  <!-- dispatch -->
  <text x="434" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#555">dispatch</text>
  <rect x="376" y="16" width="115" height="95" rx="2" fill="#f9f9f9" stroke="#ddd" stroke-width="1"/>

  <!-- archive -->
  <text x="557" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#555">archive</text>
  <rect x="499" y="16" width="115" height="95" rx="2" fill="#f9f9f9" stroke="#ddd" stroke-width="1"/>

  <!-- reject -->
  <text x="680" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#555">reject</text>
  <rect x="622" y="16" width="115" height="95" rx="2" fill="#f9f9f9" stroke="#ddd" stroke-width="1"/>

  <!-- legend -->
  <rect x="7" y="113" width="8" height="8" rx="1" fill="#c8e8b8" stroke="#78b068"/>
  <text x="18" y="121" font-family="Arial, sans-serif" font-size="8" fill="#555">* current day — not yet moved</text>

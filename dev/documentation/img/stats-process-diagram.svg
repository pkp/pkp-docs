<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="910" viewBox="0 0 860 910">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
    <marker id="arrd" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <rect width="860" height="910" fill="white"/>

  <!-- ===== User Visit ===== -->
  <rect x="340" y="30" width="180" height="42" rx="25" fill="#b5e0c0" stroke="#80b890" stroke-width="1.5"/>
  <text x="430" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="500">User Visit</text>

  <!-- Arrow: Fires -->
  <line x1="430" y1="72" x2="430" y2="111" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="438" y="94" font-family="Arial, sans-serif" font-size="11" fill="#555">Fires</text>

  <!-- ===== Event ===== -->
  <rect x="340" y="111" width="180" height="42" fill="#a8d0e8" stroke="#70a8c8" stroke-width="1.5"/>
  <text x="430" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="500">Event</text>

  <!-- Arrow: Triggers -->
  <line x1="430" y1="152" x2="430" y2="194" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="438" y="176" font-family="Arial, sans-serif" font-size="11" fill="#555">Triggers</text>

  <!-- ===== Listener ===== -->
  <rect x="340" y="194" width="180" height="42" fill="#f5de80" stroke="#c0a840" stroke-width="1.5"/>
  <text x="430" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="500">Listener</text>

  <!-- Arrow: Listener → Log File (Writes) -->
  <line x1="430" y1="236" x2="430" y2="278" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="438" y="262" font-family="Arial, sans-serif" font-size="11" fill="#555">Writes</text>

  <!-- ===== Log File (document shape) ===== -->
  <polygon points="365,278 485,278 505,298 505,368 365,368" fill="#f0b878" stroke="#c08848" stroke-width="1.5"/>
  <polygon points="485,278 485,298 505,298" fill="#c88840" stroke="#c88840"/>
  <text x="432" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="500">Log File</text>

  <!-- ===== Scheduled Task (narrower) ===== -->
  <rect x="320" y="408" width="220" height="46" rx="23" fill="#b5e0c0" stroke="#80b890" stroke-width="1.5"/>
  <text x="430" y="437" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="500">Scheduled Task</text>

  <!-- Arrow: Scheduled Task → Log File (Reads) — action style: actor points to target -->
  <line x1="320" y1="431" x2="144" y2="431" stroke="#888" stroke-width="1.5"/>
  <line x1="144" y1="431" x2="144" y2="323" stroke="#888" stroke-width="1.5"/>
  <line x1="144" y1="323" x2="364" y2="323" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- "Reads" label on the horizontal segment -->
  <text x="234" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Reads</text>

  <!-- Arrow: Scheduled Task dispatches job chain -->
  <line x1="430" y1="454" x2="430" y2="500" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="440" y="479" font-family="Arial, sans-serif" font-size="11" fill="#555">Dispatches job chain</text>

  <!-- ===== Temporary DB Tables (left, outside chain box) ===== -->
  <!-- bottom ellipse first (partially hidden by body = correct 3D look) -->
  <ellipse cx="90" cy="624" rx="66" ry="15" fill="#a8d0e8" stroke="#70a8c8" stroke-width="1.5"/>
  <rect x="24" y="542" width="132" height="82" fill="#a8d0e8" stroke="none"/>
  <line x1="24" y1="542" x2="24" y2="624" stroke="#70a8c8" stroke-width="1.5"/>
  <line x1="156" y1="542" x2="156" y2="624" stroke="#70a8c8" stroke-width="1.5"/>
  <!-- top ellipse last — visible face -->
  <ellipse cx="90" cy="542" rx="66" ry="15" fill="#a8d0e8" stroke="#70a8c8" stroke-width="1.5"/>
  <text x="90" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="15">Temporary</text>
  <text x="90" y="606" text-anchor="middle" font-family="Arial, sans-serif" font-size="15">DB Tables</text>

  <!-- ===== Daily Metrics Tables (right, outside chain box) ===== -->
  <ellipse cx="770" cy="682" rx="66" ry="15" fill="#a8d0e8" stroke="#70a8c8" stroke-width="1.5"/>
  <rect x="704" y="582" width="132" height="100" fill="#a8d0e8" stroke="none"/>
  <line x1="704" y1="582" x2="704" y2="682" stroke="#70a8c8" stroke-width="1.5"/>
  <line x1="836" y1="582" x2="836" y2="682" stroke="#70a8c8" stroke-width="1.5"/>
  <ellipse cx="770" cy="582" rx="66" ry="15" fill="#a8d0e8" stroke="#70a8c8" stroke-width="1.5"/>
  <text x="770" y="630" text-anchor="middle" font-family="Arial, sans-serif" font-size="15">Daily</text>
  <text x="770" y="646" text-anchor="middle" font-family="Arial, sans-serif" font-size="15">Metrics</text>
  <text x="770" y="662" text-anchor="middle" font-family="Arial, sans-serif" font-size="15">Tables</text>

  <!-- ===== Bus::chain() BOX ===== -->
  <rect x="240" y="500" width="380" height="230" rx="8" fill="#f5f5f5" stroke="#bbb" stroke-width="1.5" stroke-dasharray="8,5"/>
  <text x="400" y="518" font-family="Arial, sans-serif" font-size="11" fill="#555">Bus::chain()</text>

  <!-- ===== Job Chain box ===== -->
  <rect x="300" y="534" width="260" height="58" rx="4" fill="#f5de80" stroke="#c0a840" stroke-width="2"/>
  <text x="430" y="564" text-anchor="middle" font-family="Arial, sans-serif" font-size="15">Job Chain</text>
  <text x="430" y="580" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">(per log file)</text>

  <!-- Chain arrow: Job Chain → CompileMonthlyMetrics (shorter gap) -->
  <line x1="430" y1="592" x2="430" y2="634" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== CompileMonthlyMetrics box (moved up) ===== -->
  <rect x="300" y="634" width="260" height="58" rx="4" fill="#f5de80" stroke="#c0a840" stroke-width="2"/>
  <text x="430" y="664" text-anchor="middle" font-family="Arial, sans-serif" font-size="15">CompileMonthlyMetrics</text>
  <text x="430" y="680" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">(per month)</text>

  <!-- ===== Arrows: Job Chain ↔ Temporary DB Tables ===== -->
  <!-- Write: Job Chain → Temp DB -->
  <line x1="300" y1="542" x2="155" y2="572" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="158" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#555">Strips bots from logs,</text>
  <text x="158" y="534" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#555">stores remaining log entries</text>

  <!-- Read: Temp DB → Job Chain -->
  <line x1="156" y1="600" x2="300" y2="568" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="168" y="614" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#555">Strips double-clicks,</text>
  <text x="168" y="628" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#555">reads entries</text>

  <!-- ===== Arrow: Job Chain → Daily Metrics Tables ===== -->
  <line x1="560" y1="562" x2="704" y2="600" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="586" y="548" font-family="Arial, sans-serif" font-size="11" fill="#555">Compiles final</text>
  <text x="586" y="562" font-family="Arial, sans-serif" font-size="11" fill="#555">daily metrics</text>

  <!-- ===== Dashed arrow: CompileMonthlyMetrics → Daily Metrics (deletes if configured) ===== -->
  <line x1="560" y1="664" x2="704" y2="664" stroke="#888" stroke-width="1.5" marker-end="url(#arrd)" stroke-dasharray="4,3"/>
  <text x="582" y="682" font-family="Arial, sans-serif" font-size="11" fill="#555">Deletes daily metrics</text>
  <text x="582" y="696" font-family="Arial, sans-serif" font-size="11" fill="#555">(if configured)</text>

  <!-- ===== Arrow: CompileMonthlyMetrics → Monthly Metrics Tables ===== -->
  <line x1="430" y1="692" x2="430" y2="792" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="438" y="764" font-family="Arial, sans-serif" font-size="11" fill="#555">Compiles final monthly metrics</text>

  <!-- ===== Monthly Metrics Tables (bottom center cylinder) ===== -->
  <ellipse cx="430" cy="878" rx="110" ry="18" fill="#a8d0e8" stroke="#70a8c8" stroke-width="1.5"/>
  <rect x="320" y="810" width="220" height="68" fill="#a8d0e8" stroke="none"/>
  <line x1="320" y1="810" x2="320" y2="878" stroke="#70a8c8" stroke-width="1.5"/>
  <line x1="540" y1="810" x2="540" y2="878" stroke="#70a8c8" stroke-width="1.5"/>
  <ellipse cx="430" cy="810" rx="110" ry="18" fill="#a8d0e8" stroke="#70a8c8" stroke-width="1.5"/>
  <text x="430" y="860" text-anchor="middle" font-family="Arial, sans-serif" font-size="15">Monthly Metrics Tables</text>

</svg>
